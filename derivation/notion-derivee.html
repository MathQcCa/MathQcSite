<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Notion de dérivée</title>
  <link rel="stylesheet" href="../styles.css">
</head>

<body>

<header class="hero">
  <h1>Notion de dérivée</h1>
  <p>Idée fondamentale : taux de variation instantané</p>
</header>

<main class="container">

  <section class="card">
    <h2>Définition</h2>
    <p>
      La dérivée d’une fonction représente la pente instantanée.
    </p>
  </section>

  <section class="card">
    <h2>Formule</h2>
    <p>
      f'(x) = lim (h→0) [f(x+h) - f(x)] / h
    </p>
  </section>

  <section class="card">
    <a href="index.html">← Retour dérivation</a>
  </section>

</main>

</body>
</html>
